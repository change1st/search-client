name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python (macOS only, fix electron-builder@22 ENOENT /usr/bin/python)
        if: matrix.os == 'macos-latest'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Export PYTHON_PATH (macOS only)
        if: matrix.os == 'macos-latest'
        run: |
          PY=$(which python3)
          echo "PYTHON_PATH=$PY" >> $GITHUB_ENV
          echo "PYTHON=$PY" >> $GITHUB_ENV
          echo "Found python3 at: $PY"
          # Also create a symlink at /usr/local/bin/python as fallback
          sudo mkdir -p /usr/local/bin
          sudo ln -sf "$PY" /usr/local/bin/python
          # Try to symlink at /usr/bin/python as well (may fail on SIP)
          sudo ln -sf "$PY" /usr/bin/python 2>/dev/null || echo "Cannot symlink /usr/bin/python (SIP-protected)"
          ls -la /usr/bin/python /usr/local/bin/python 2>/dev/null || true

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build (macOS)
        if: matrix.os == 'macos-latest'
        run: npm run package-mac

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        run: npm run package-win

      - name: Build (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: npm run package-linux

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
            dist/*.tar.gz
          if-no-files-found: ignore
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f \
            \( -name "*.dmg" -o -name "*.zip" -o -name "*.exe" \
            -o -name "*.AppImage" -o -name "*.deb" -o -name "*.tar.gz" \) \
            -exec mv {} release/ \;
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
